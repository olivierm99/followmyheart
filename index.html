<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0d0308;font-family:"Space Mono",monospace;overflow:hidden;cursor:default;user-select:none;}

#bgVideo{position:fixed;top:0;left:0;width:100%;height:calc(100% - 120px);object-fit:contain;background:#000;z-index:0;opacity:0;transition:opacity 1.5s;min-height:200px;}
#bgVideo.on{opacity:1;}
#warmGlow{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 55% 55% at 50% 48%,rgba(80,8,20,0.45) 0%,rgba(40,4,12,0.3) 35%,rgba(15,2,6,0.15) 60%,transparent 80%);}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 70% 65% at 50% 50%,transparent 0%,transparent 22%,rgba(0,0,0,0.35) 52%,rgba(0,0,0,0.85) 100%);}

.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.9s;}
.screen.hidden{opacity:0;pointer-events:none;}

#langPicker{position:fixed;inset:0;z-index:9999;background:#0d0308;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;}
.lang-opt{font-family:"Space Mono",monospace;font-size:14px;color:rgba(215,215,215,0.72);letter-spacing:5px;text-transform:uppercase;background:none;border:none;cursor:pointer;padding:12px 28px;-webkit-tap-highlight-color:transparent;transition:color 0.2s;}
.lang-opt:hover{color:#fff;}
#langSep{font-size:10px;color:rgba(150,150,150,0.22);letter-spacing:4px;}

#nav{position:fixed;top:18px;right:20px;z-index:30;display:flex;gap:22px;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.8s;}
#nav.on{opacity:1;pointer-events:all;}
#nav a{font-family:"Space Mono",monospace;font-size:11px;color:rgba(220,180,140,0.65);letter-spacing:2px;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:color 0.3s;}
#nav a:hover{color:rgba(220,140,180,0.9);}

#sndBtn{font-size:13px;background:none;border:1px solid rgba(255,255,255,0.28);cursor:pointer;opacity:0;line-height:1;padding:4px 7px;transition:opacity 0.8s,border-color 0.3s;pointer-events:none;color:rgba(255,255,255,0.7);border-radius:0;vertical-align:middle;}
#sndBtn.on{opacity:1;pointer-events:all;}
#sndBtn:hover{border-color:rgba(255,255,255,0.6);}

/* BPM panel — right-aligned to graph width */
#bpmPanel{position:fixed;bottom:22px;z-index:13;opacity:0;transition:opacity 1s;pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
#bpmPanel.on{opacity:1;}
#bpmLabel{font-size:7px;color:rgba(220,180,140,0.65);letter-spacing:3px;text-transform:uppercase;}
#bpmRowEl{display:flex;align-items:center;gap:6px;}
#bpmHeart{font-size:14px;line-height:1;color:rgba(220,160,100,0.85);}
#bpmNum{font-size:48px;line-height:1;font-family:"Space Mono",monospace;color:rgba(220,160,100,0.9);letter-spacing:-2px;text-shadow:0 0 30px rgba(200,80,80,0.4);}
#bpmState{font-size:8px;color:rgba(220,180,140,0.65);letter-spacing:3px;text-transform:uppercase;}

#s1Frost{position:absolute;inset:0;background:rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.9s;}
#introWrap{position:relative;z-index:1;max-width:620px;width:92%;display:flex;flex-direction:column;align-items:flex-start;text-align:left;transition:opacity 0.8s;}
#introLines{display:flex;flex-direction:column;align-items:flex-start;width:100%;}
.iline{font-size:13px;color:rgba(225,225,225,0.88);letter-spacing:1.2px;line-height:1.3;text-align:left;padding:6px 0;display:block;min-height:20px;text-shadow:0 1px 12px rgba(0,0,0,0.95),0 0 30px rgba(0,0,0,0.9);white-space:normal;}
.iline.quote{font-size:15px;color:rgba(255,255,255,0.97);letter-spacing:1.8px;padding:10px 0 14px 0;text-align:left;text-shadow:0 1px 16px rgba(0,0,0,1),0 0 40px rgba(0,0,0,0.95);white-space:normal;}
.iline.gap{min-height:12px;padding:6px 0;}
.bcursor{display:inline-block;width:1.5px;height:13px;background:rgba(210,210,210,0.65);margin-left:1px;vertical-align:middle;}
.bcursor.blink{animation:bl 0.52s infinite;}
@keyframes bl{0%,49%{opacity:1}50%,100%{opacity:0}}

#enterBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-family:"Space Mono",monospace;font-size:15px;color:rgba(255,255,255,0.9);letter-spacing:4px;background:none;border:none;cursor:pointer;opacity:0;transition:opacity 0.9s,color 0.3s;white-space:nowrap;pointer-events:none;text-shadow:0 0 20px rgba(0,0,0,1);}
#enterBtn.on{opacity:1;pointer-events:all;}
#enterBtn:hover{color:rgba(210,120,80,0.92);}

#graphArea{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:12;display:flex;flex-direction:column;align-items:flex-start;gap:5px;opacity:0;transition:opacity 1.5s;pointer-events:none;max-width:100vw;}
#graphArea.on{opacity:1;pointer-events:all;}
#subjectLabel{font-size:8px;color:rgba(230,195,160,0.88);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
#heartGraph{display:block;}

/* EGG */
#eggLayer{position:fixed;inset:0;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;opacity:0;pointer-events:none;transition:opacity 0.7s;}
#eggLayer.on{opacity:1;pointer-events:all;}
#eggText{font-size:13px;color:rgba(255,255,255,0.95);letter-spacing:1.8px;text-align:center;line-height:1.6;text-shadow:0 0 40px rgba(0,0,0,1),0 0 20px rgba(0,0,0,1),0 2px 12px rgba(0,0,0,1);white-space:normal;}
#eggInputWrap{display:none;flex-direction:column;align-items:center;gap:16px;background:rgba(0,0,0,0.75);padding:22px 36px;backdrop-filter:blur(4px);}
#eggInputWrap.on{display:flex;}
#ynPromptTxt{display:none;}
#ynRow{display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(210,210,210,0.28);padding-bottom:5px;}
#ynField{background:transparent;border:none;color:rgba(255,255,255,0.95);font-family:"Space Mono",monospace;font-size:24px;letter-spacing:6px;width:44px;text-align:center;outline:none;padding:4px 0;text-transform:uppercase;caret-color:transparent;}
#ynCursorEl{display:inline-block;width:2px;height:24px;background:rgba(220,220,220,0.72);animation:bl 0.52s infinite;vertical-align:middle;}
#ynHintTxt{font-size:11px;color:rgba(210,210,210,0.72);letter-spacing:3px;}

/* Follow your wrap */
#followYourWrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:26;opacity:0;pointer-events:none;transition:opacity 0.7s;text-align:center;white-space:nowrap;}
#followYourWrap.on{opacity:1;}
#followYourText{font-size:16px;color:rgba(255,255,255,0.92);letter-spacing:4px;font-family:"Space Mono",monospace;text-shadow:0 0 30px rgba(0,0,0,1);}
#followYourText em{font-style:italic;text-decoration:underline;text-underline-offset:4px;color:rgba(220,140,180,0.95);}

/* S3 */
#s3Panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:440px;display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;opacity:0;pointer-events:none;transition:opacity 0.8s;z-index:15;}
#s3Panel.on{opacity:1;pointer-events:all;}
#s3Intro{font-size:12px;color:rgba(215,215,215,0.88);letter-spacing:1.6px;line-height:2.6;text-shadow:0 0 40px rgba(0,0,0,1),0 2px 10px rgba(0,0,0,1);}
.cbtn{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(230,230,230,0.82);background:none;border:1px solid rgba(200,200,200,0.35);padding:12px 0;cursor:pointer;width:240px;transition:color 0.3s,border-color 0.3s,background 0.3s;}
.cbtn:hover{color:#fff;border-color:rgba(220,160,120,0.6);background:rgba(220,120,80,0.08);}
#anonWrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
#anonField{background:rgba(255,255,255,0.04);border:1px solid rgba(200,200,200,0.25);color:rgba(220,220,220,0.88);font-family:"Space Mono",monospace;font-size:9px;letter-spacing:1.2px;width:100%;max-width:340px;outline:none;padding:12px 14px;resize:none;line-height:1.8;transition:border-color 0.3s,box-shadow 0.3s;}
#anonField:focus{border-color:rgba(220,140,80,0.5);box-shadow:0 0 14px rgba(220,120,80,0.18),0 0 4px rgba(200,80,120,0.12);}
#anonField::placeholder{color:rgba(200,200,200,0.45);}
#anonSubmit{font-family:"Space Mono",monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(210,210,210,0.65);background:none;border:1px solid rgba(180,180,180,0.25);cursor:pointer;transition:color 0.3s,border-color 0.3s;padding:8px 20px;}
#anonSubmit:hover{color:rgba(230,230,230,0.95);border-color:rgba(200,200,200,0.45);}
#anonMsg{font-size:8px;color:rgba(180,180,180,0.5);letter-spacing:1.5px;min-height:14px;}
#s3Back{font-family:"Space Mono",monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(160,160,160,0.45);background:none;border:none;cursor:pointer;transition:color 0.3s;margin-top:4px;}
#s3Back:hover{color:rgba(210,210,210,0.85);}

/* Oura panel */
#ouraPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;opacity:0;pointer-events:none;transition:opacity 0.8s;z-index:15;}
#ouraPanel.on{opacity:1;pointer-events:all;}
#ouraInstructions{font-size:11px;color:rgba(210,210,210,0.82);letter-spacing:1.5px;line-height:2.6;white-space:pre-line;text-shadow:0 0 30px rgba(0,0,0,1);}
#tokenField{background:transparent;border:none;border-bottom:1px solid rgba(180,180,180,0.3);color:rgba(200,200,200,0.9);font-family:"Space Mono",monospace;font-size:9px;letter-spacing:1.5px;width:280px;text-align:center;outline:none;padding:8px 0;}
#tokenField::placeholder{color:rgba(140,140,140,0.4);}
#tokenBtns{display:flex;gap:24px;}
#tokenSubmit,#tokenCancel,#ouraBack{font-family:"Space Mono",monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(180,180,180,0.52);background:none;border:none;cursor:pointer;transition:color 0.3s;}
#tokenSubmit{border-bottom:1px solid rgba(180,180,180,0.2);padding-bottom:3px;}
#tokenSubmit:hover,#tokenCancel:hover,#ouraBack:hover{color:rgba(230,230,230,0.9);}
#ouraPriv{font-size:8px;font-style:italic;color:rgba(170,170,170,0.55);letter-spacing:0.8px;line-height:2.2;white-space:pre-line;max-width:360px;}
#tokenError{font-size:8px;color:rgba(200,80,80,0.75);letter-spacing:1.5px;min-height:14px;}

#transMsg{position:fixed;inset:0;z-index:35;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.9s;}
#transMsg.on{opacity:1;}
#transTxt{font-size:10px;color:rgba(200,200,200,0.52);letter-spacing:2.5px;text-shadow:0 0 30px rgba(0,0,0,1);}

#about,#contact{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:3rem;opacity:0;pointer-events:none;transition:opacity 0.8s;}
#about.on,#contact.on{opacity:1;pointer-events:all;}
.page-title{font-size:13px;background:linear-gradient(90deg,rgba(220,160,80,0.9),rgba(200,50,80,0.9),rgba(180,60,200,0.85));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;}
.page-text{font-size:12px;color:rgba(205,205,205,0.78);letter-spacing:1.4px;line-height:2.8;text-align:center;max-width:480px;white-space:pre-line;}
.page-q{font-size:14px;color:rgba(225,225,225,0.88);letter-spacing:2px;}
.page-email{font-size:11px;color:rgba(200,80,80,0.82);letter-spacing:1.5px;text-decoration:none;border-bottom:1px solid rgba(150,40,40,0.25);padding-bottom:3px;transition:color 0.3s;}
.page-email:hover{color:rgba(220,70,70,0.95);}
.page-close{font-family:"Space Mono",monospace;font-size:9px;color:rgba(180,180,180,0.52);letter-spacing:2px;text-transform:uppercase;background:none;border:none;cursor:pointer;transition:color 0.3s;}
.page-close:hover{color:rgba(210,210,210,0.82);}

@media(min-width:700px){
  .iline{white-space:nowrap;}
  .iline.quote{white-space:nowrap;}
  #eggText{white-space:nowrap;}
}

@media(max-width:699px){
  #introWrap{padding:0 20px;}
  .iline{font-size:12px;letter-spacing:0.8px;padding:5px 0;}
  .iline.quote{font-size:13px;letter-spacing:1.2px;}
  #eggText{font-size:12px;letter-spacing:1.2px;padding:0 20px;}
  #subjectLabel{white-space:normal;font-size:9px;letter-spacing:1px;line-height:1.8;max-width:calc(100vw - 48px);}
  #bpmPanel{right:8px;bottom:130px;}
  #bpmNum{font-size:42px;}
  #bpmLabel{font-size:8px;letter-spacing:2px;}
  #bpmState{font-size:9px;letter-spacing:2px;}
  #graphArea{width:100%;left:0;transform:none;}
}
</style>

// LIFE COUNTER — born 11 July 1980 09:06 Paris (UTC+2 summer = UTC+1 winter, but July=summer so UTC+2)
var BIRTH_UTC=Date.UTC(1980,6,11,7,6,0); // 9h06 Paris summer = 7h06 UTC

function lifeCounter(){
  var diff=Date.now()-BIRTH_UTC;
  var ms=diff;
  var years=Math.floor(ms/(365.25*24*3600*1000)); ms-=years*365.25*24*3600*1000;
  var months=Math.floor(ms/(30.44*24*3600*1000)); ms-=months*30.44*24*3600*1000;
  var days=Math.floor(ms/(24*3600*1000)); ms-=days*24*3600*1000;
  var hours=Math.floor(ms/(3600*1000)); ms-=hours*3600*1000;
  var minutes=Math.floor(ms/60000);
  return {years:years,months:months,days:days,hours:hours,minutes:minutes};
}

}

function b64ToBuffer(b64){var bin=atob(b64),buf=new ArrayBuffer(bin.length),v=new Uint8Array(buf);for(var i=0;i<bin.length;i++)v[i]=bin.charCodeAt(i);return buf;}
function initAudio(onReady){
  if(audioCtx){if(onReady)onReady();return;}
  var AC=window.AudioContext||window.webkitAudioContext;
  if(!AC){if(onReady)onReady();return;}
  // Create context synchronously in user gesture
  audioCtx=new AC();
  // Unlock iOS audio immediately with a silent buffer
  var silence=audioCtx.createBuffer(1,1,22050);
  var src=audioCtx.createBufferSource();
  src.buffer=silence;
  src.connect(audioCtx.destination);
  src.start(0);
  if(audioCtx.state==="suspended") audioCtx.resume();
  // Now fetch the real sound
  fetch(SOUND_URL)
    .then(function(r){return r.arrayBuffer();})
    .then(function(buf){return audioCtx.decodeAudioData(buf);})
    .then(function(decoded){
      audioBuffer=decoded;
      if(onReady)onReady();
    })
    .catch(function(){
      useOscillator=true;
      if(onReady)onReady();
    });
}
function scheduleBeat(time){
  if(!soundOn||!audioCtx)return;
  if(audioCtx.state==="suspended")audioCtx.resume();
  try{
    var t=Math.max(time,audioCtx.currentTime);
    if(audioBuffer){
      var src=audioCtx.createBufferSource();
      src.buffer=audioBuffer;
      var g=audioCtx.createGain();g.gain.value=0.82;
      src.connect(g);g.connect(audioCtx.destination);
      src.start(t);
    } else if(useOscillator){
      // Fallback: synthetic lub-dub with oscillators
      [
        {f:80,start:t,dur:0.12,vol:0.4},
        {f:70,start:t+0.28,dur:0.10,vol:0.3}
      ].forEach(function(b){
        var osc=audioCtx.createOscillator();
        var g=audioCtx.createGain();
        osc.frequency.value=b.f;
        osc.type="sine";
        g.gain.setValueAtTime(0,b.start);
        g.gain.linearRampToValueAtTime(b.vol,b.start+0.02);
        g.gain.linearRampToValueAtTime(0,b.start+b.dur);
        osc.connect(g);g.connect(audioCtx.destination);
        osc.start(b.start);osc.stop(b.start+b.dur+0.01);
      });
    }
  }catch(e){}
}
function scheduler(){
  if(!audioCtx)return;
  while(nextBeatTime<audioCtx.currentTime+0.15){scheduleBeat(nextBeatTime);nextBeatTime+=60.0/activeBpm;}
  schedHandle=setTimeout(scheduler,25);
}
function stopScheduler(){clearTimeout(schedHandle);}

// TYPEWRITER — faster version for instant-then-slow
var TM={a:"sq",e:"rw",i:"ou",o:"ip",u:"yi",r:"et",t:"ry",n:"bm",s:"ad",l:"ko",c:"vx",m:"nk",d:"sf",p:"ol",h:"gj"};

function typeChars(container,text,speed,noTypo,onDone){
  var cur=document.createElement("span");cur.className="bcursor blink";container.appendChild(cur);
  var chars=text.split(""),i=0;
  var typoPositions=[];
  if(speed==="human"&&!noTypo){
    var elig=[];
    for(var k=0;k<chars.length;k++)if(/[a-zA-Z]/.test(chars[k])&&TM[chars[k].toLowerCase()])elig.push(k);
    for(var att=0;att<80&&typoPositions.length<2;att++){
      var ri=elig[Math.floor(Math.random()*elig.length)];
      var ok=true;for(var jj=0;jj<typoPositions.length;jj++)if(Math.abs(typoPositions[jj]-ri)<20){ok=false;break;}
      if(ok)typoPositions.push(ri);
    }
  }
  function next(){
    if(i>=chars.length){if(cur.parentNode)cur.parentNode.removeChild(cur);if(onDone)onDone();return;}
    var c=chars[i];
    var bd;
    if(speed==="instant"){bd=6+Math.random()*4;}
    else if(speed==="slow"){bd=c===" "?120+Math.random()*40:(c==="."||c==="?"||c===","||c==="\u2026")?250+Math.random()*80:70+Math.random()*50;}
    else{bd=c===" "?35+Math.random()*15:(c==="."||c==="?"||c===","||c==="\u2026")?80+Math.random()*30:20+Math.random()*18;}
    var isTypo=false;
    for(var j=0;j<typoPositions.length;j++)if(typoPositions[j]===i){isTypo=true;break;}
    if(isTypo&&TM[c.toLowerCase()]){
      var wc=TM[c.toLowerCase()][Math.floor(Math.random()*TM[c.toLowerCase()].length)];
      var wt=document.createTextNode(wc);container.insertBefore(wt,cur);
      setTimeout(function(){container.removeChild(wt);setTimeout(function(){container.insertBefore(document.createTextNode(c),cur);i++;setTimeout(next,bd);},80);},100+Math.random()*120);
    } else {container.insertBefore(document.createTextNode(c),cur);i++;setTimeout(next,bd);}
  }
  next();
}

var WORKER_URL = "https://followmyheart-api.olivier-8db.workers.dev";

function fetchOwnerData(onDone){
  // J-7 en heure de Montréal
  var now=new Date();
  var mtl=new Date(now.toLocaleString("en-US",{timeZone:"America/Toronto"}));
  mtl.setDate(mtl.getDate()-7);
  var ds=mtl.getFullYear()+"-"+String(mtl.getMonth()+1).padStart(2,"0")+"-"+String(mtl.getDate()).padStart(2,"0");
  fetch(WORKER_URL+"?date="+ds)
    .then(function(r){if(!r.ok)throw new Error("fetch");return r.json();})
    .then(function(json){
      if(!json.data||!json.data.length)throw new Error("empty");
      var ud=json.data.map(function(p){
        var d2=new Date(p.timestamp);
        var mtlT=new Date(d2.toLocaleString("en-US",{timeZone:"America/Toronto"}));
        return {t:mtlT.getHours()+mtlT.getMinutes()/60,bpm:p.bpm,src:p.source==="workout"?"workout":p.source==="rest"?"rest":"awake"};
      }).filter(function(p){return p.t<=NOW_HOUR;}).sort(function(a,b){return a.t-b.t;});
      if(!ud.length)throw new Error("empty");
      onDone(ud);
    })
    .catch(function(){
      // Fallback to hardcoded data
      onDone(OWNER_DATA);
    });
}

function drawGraph(data){
  if(!data||!data.length)return;
  var hg=el("heartGraph");if(!hg)return;
  var gCtx=hg.getContext("2d");
  var minBpm=44,maxBpm=130,nowH=NOW_HOUR||14;
  var gH=90,padL=38,padR=12,padT=10,padB=28;
  GRAPH_W=Math.max(80,W<700?Math.round(W*0.96):Math.round(W*0.60));

  hg.style.width=GRAPH_W+"px";hg.style.height=gH+"px";
  hg.width=Math.round(GRAPH_W*dpr);hg.height=Math.round(gH*dpr);
  gCtx.setTransform(dpr,0,0,dpr,0,0);
  gCtx.clearRect(0,0,GRAPH_W,gH);
  var chartW=GRAPH_W-padL-padR,chartH=gH-padT-padB;
  function xP(t){return padL+(t/nowH)*chartW;}
  function yP(b){return padT+chartH-(b-minBpm)/(maxBpm-minBpm)*chartH;}

  gCtx.fillStyle="rgba(8,2,6,0.85)";gCtx.fillRect(0,0,GRAPH_W,gH);
  gCtx.font="6px Space Mono,monospace";
  [50,75,100].forEach(function(b){

    gCtx.strokeStyle="rgba(255,255,255,0.05)";gCtx.lineWidth=0.5;gCtx.stroke();
    gCtx.fillStyle="rgba(220,180,140,0.55)";gCtx.textAlign="right";gCtx.fillText(b,padL-4,y+3);
  });
  gCtx.textAlign="center";
  for(var h=0;h<=nowH;h+=3){
    gCtx.fillStyle="rgba(220,180,140,0.42)";
    gCtx.fillText(h+"h",xP(h),gH-6);
  }
  gCtx.beginPath();data.forEach(function(p,i){i===0?gCtx.moveTo(xP(p.t),yP(p.bpm)):gCtx.lineTo(xP(p.t),yP(p.bpm));});
  gCtx.lineTo(xP(data[data.length-1].t),gH-padB);gCtx.lineTo(xP(data[0].t),gH-padB);gCtx.closePath();
  var fillG=gCtx.createLinearGradient(0,padT,0,gH-padB);
  fillG.addColorStop(0,"rgba(160,40,20,0.18)");fillG.addColorStop(1,"rgba(60,5,15,0)");
  gCtx.fillStyle=fillG;gCtx.fill();
  // workout zones
  var inW=false,wSi=null;
  data.forEach(function(p,i){
    if(p.src==="workout"&&!inW){inW=true;wSi=i;}
    else if(p.src!=="workout"&&inW){
      var rg=gCtx.createLinearGradient(0,padT,0,padT+chartH);
      rg.addColorStop(0,"rgba(180,20,20,0.25)");rg.addColorStop(1,"rgba(130,10,10,0)");
      gCtx.fillStyle=rg;gCtx.fillRect(xP(data[wSi].t),padT,xP(data[i-1].t)-xP(data[wSi].t),chartH);
      inW=false;
    }
  });
  // gradient line
  var lg=gCtx.createLinearGradient(xP(data[0].t),0,xP(data[data.length-1].t),0);
  lg.addColorStop(0,"hsl(35,82%,62%)");lg.addColorStop(0.30,"hsl(10,80%,60%)");
  lg.addColorStop(0.55,"hsl(0,78%,56%)");lg.addColorStop(0.75,"hsl(330,76%,58%)");lg.addColorStop(1.0,"hsl(290,72%,55%)");
  gCtx.save();gCtx.shadowBlur=10;gCtx.shadowColor="rgba(200,80,120,0.5)";
  gCtx.beginPath();data.forEach(function(p,i){i===0?gCtx.moveTo(xP(p.t),yP(p.bpm)):gCtx.lineTo(xP(p.t),yP(p.bpm));});
  gCtx.strokeStyle=lg;gCtx.lineWidth=3;gCtx.lineCap="round";gCtx.stroke();gCtx.restore();
  gCtx.beginPath();data.forEach(function(p,i){i===0?gCtx.moveTo(xP(p.t),yP(p.bpm)):gCtx.lineTo(xP(p.t),yP(p.bpm));});
  gCtx.strokeStyle=lg;gCtx.lineWidth=1.2;gCtx.lineCap="round";gCtx.stroke();
  // hover
  if(hoveredT!==null){
    var hx=xP(hoveredT),hy=yP(hoveredBpm||50);
    gCtx.beginPath();gCtx.moveTo(hx,padT);gCtx.lineTo(hx,gH-padB);
    gCtx.strokeStyle="rgba(220,180,120,0.4)";gCtx.lineWidth=0.8;gCtx.setLineDash([3,4]);gCtx.stroke();gCtx.setLineDash([]);
    gCtx.beginPath();gCtx.arc(hx,hy,3.5,0,Math.PI*2);gCtx.fillStyle="rgba(220,180,120,0.9)";gCtx.fill();
  }
  var lx=xP(data[data.length-1].t);
  gCtx.beginPath();gCtx.moveTo(lx,padT);gCtx.lineTo(lx,gH-padB);
  gCtx.strokeStyle="rgba(200,100,60,0.4)";gCtx.lineWidth=0.8;gCtx.setLineDash([2,3]);gCtx.stroke();gCtx.setLineDash([]);
  gCtx.beginPath();gCtx.arc(lx,yP(data[data.length-1].bpm),4,0,Math.PI*2);gCtx.fillStyle="rgba(200,100,60,0.85)";gCtx.fill();

  hg.style.cursor="crosshair";
  hg.onmousemove=function(e){
    var rect=hg.getBoundingClientRect();var mx=(e.clientX-rect.left)*(GRAPH_W/rect.width);
    if(mx<padL||mx>GRAPH_W-padR){hoveredT=null;hoveredBpm=null;drawGraph(data);return;}
    var t=(mx-padL)/chartW*nowH;var near=data[0];
    for(var i=0;i<data.length;i++)if(Math.abs(data[i].t-t)<Math.abs(near.t-t))near=data[i];
    hoveredT=near.t;hoveredBpm=near.bpm;drawGraph(data);
    var hh=Math.floor(near.t),mm=String(Math.round((near.t-hh)*60)).padStart(2,"0");
    el("subjectLabel").textContent=T().subjectOwner+" \u00b7 "+hh+"h"+mm+" \u00b7 "+near.bpm+" bpm";
  };
  hg.onmouseleave=function(){hoveredT=null;hoveredBpm=null;drawGraph(data);updateSubjectLabel();};
  hg.onclick=function(e){
    var rect=hg.getBoundingClientRect();var mx=(e.clientX-rect.left)*(GRAPH_W/rect.width);
    if(mx<padL||mx>GRAPH_W-padR)return;
    var t=(mx-padL)/chartW*nowH;var near=data[0];
    for(var i=0;i<data.length;i++)if(Math.abs(data[i].t-t)<Math.abs(near.t-t))near=data[i];
    activeBpm=near.bpm;applyVideoRate();
  };
}

// EGG — each line appears alone, then clears
document.body.addEventListener("click",function(e){
  if(curScreen!==2)return;
  if(e.target.closest("#nav")||e.target.closest("#sndBtn")||e.target.closest("#ynField")||
     e.target.closest("#s3Panel")||e.target.closest("#ouraPanel")||e.target.closest("#transMsg")||
     e.target.closest("#about")||e.target.closest("#contact")||e.target.closest("#eggInputWrap")||
     e.target.closest("#graphArea")||e.target.closest("#followYourWrap"))return;
  if(!eggStarted){eggStarted=true;startEgg();}
});

function startEgg(){
  el("eggLayer").classList.add("on");
  runEggLines(0);
}

function runEggLines(idx){
  var lines=EGG[lang];
  if(idx>=lines.length){
    el("eggText").textContent="";
    el("ynHintTxt").textContent=T().yn;
    el("ynPromptTxt").textContent=T().ynPrompt;
    el("eggInputWrap").classList.add("on");
    el("ynField").focus();
    return;
  }
  var line=lines[idx];
  if(line.isGap){
    setTimeout(function(){runEggLines(idx+1);},400);
    return;
  }
  var preWait=line.preGap||0;
  setTimeout(function(){
    el("eggText").textContent="";
    el("eggText").style.opacity="1";
    el("eggText").style.transition="";
    typeChars(el("eggText"),line.text,"slow",true,function(){
      if(line.isLast){
        setTimeout(function(){runEggLines(idx+1);},line.pause||200);
      } else {
        setTimeout(function(){
          el("eggText").style.transition="opacity 0.6s";
          el("eggText").style.opacity="0";
          setTimeout(function(){
            el("eggText").style.transition="";
            runEggLines(idx+1);
          },650);
        },line.pause||500);
      }
    });
  },preWait);
}

el("ynField").addEventListener("keydown",function(e){e.stopPropagation();});
el("ynField").addEventListener("input",function(){
  var v=el("ynField").value.toUpperCase();el("ynField").value=v;
  if(v===T().yesKey){
    el("eggInputWrap").classList.remove("on");
    el("eggLayer").classList.remove("on");
    showFollowYour();
  } else if(v===T().noKey){
    // Show no message, stay on s2
    el("eggInputWrap").classList.remove("on");
    el("eggText").textContent="";
    el("eggText").style.opacity="1";
    el("eggText").style.transition="";
    typeChars(el("eggText"),T().noMsg,"slow",true,function(){
      setTimeout(function(){
        el("eggLayer").classList.remove("on");
        el("eggText").textContent="";
        el("ynField").value="";
        eggStarted=false;
      },3000);
    });
  } else if(v!=="")el("ynField").value="";
});

// FOLLOW YOUR HEART
function showFollowYour(){
  var wrap=el("followYourWrap"),txt=el("followYourText");
  txt.innerHTML="";wrap.classList.add("on");
  // Type "Follow " at slow speed
  typeChars(txt,"Follow ","slow",true,function(){
    // Then type "my" at slow speed
    var mySpan=document.createElement("span");txt.appendChild(mySpan);
    typeChars(mySpan,"my","slow",true,function(){
      // Backspace "my" slowly
      var c=mySpan.textContent;
      var bsIdx=c.length;
      function backspace(){
        if(bsIdx<=0){
          mySpan.textContent="";
          var em=document.createElement("em");txt.appendChild(em);
          typeChars(em,"your","slow",true,function(){
            typeChars(txt," heart","slow",true,function(){
              setTimeout(showS3,2000);
            });
          });
          return;
        }
        bsIdx--;
        mySpan.textContent=c.substring(0,bsIdx);
        setTimeout(backspace,120+Math.random()*60);
      }
      backspace();
    });
  });
}

  el("tokenError").textContent="";sessionStorage.setItem("fmh_token",val);connectOura(val);

function returnToS2(){
  curScreen=2;el("s2").classList.remove("hidden");
  el("bgVideo").classList.add("on");el("bgVideo").play().catch(function(){});
  applyVideoRate();el("graphArea").classList.add("on");el("bpmPanel").classList.add("on");el("sndBtn").classList.add("on");el("nav").classList.add("on");
  drawGraph(activeData);setTimeout(function(){positionBpmPanel();},50);
  eggStarted=false;el("ynField").value="";
  nextBeatTime=audioCtx?audioCtx.currentTime+0.1:0;scheduler();
}

// ANON EMAIL
el("anonSubmit").addEventListener("click",function(e){
  e.stopPropagation();var msg=el("anonField").value.trim();
  if(!msg){el("anonMsg").textContent=lang==="fr"?"Message vide.":"Empty message.";return;}
  el("anonSubmit").disabled=true;
  fetch("https://formspree.io/f/mjgzvnlw",{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify({message:msg,lang:lang})})
    .then(function(r){el("anonMsg").textContent=r.ok?T().anonSent:T().anonError;el("anonSubmit").disabled=false;el("anonField").value="";})
    .catch(function(){el("anonMsg").textContent=T().anonError;el("anonSubmit").disabled=false;});
});

// CONNECT OURA
function connectOura(token){
  el("ouraPanel").classList.remove("on");el("transTxt").textContent=T().connecting;el("transMsg").classList.add("on");
  var d=new Date();d.setDate(d.getDate()-7);var ds=d.toISOString().split("T")[0];
  fetch("https://api.ouraring.com/v2/usercollection/heartrate?start_datetime="+ds+"T00:00:00&end_datetime="+ds+"T23:59:59",{headers:{"Authorization":"Bearer "+token}})
    .then(function(r){if(r.status===401||r.status===403)throw new Error("invalid");return r.json();})
    .then(function(json){
      if(!json.data||!json.data.length)throw new Error("nodata");
      var ud=json.data.map(function(p){var d2=new Date(p.timestamp);return{t:d2.getHours()+d2.getMinutes()/60,bpm:p.bpm,src:p.source==="workout"?"workout":p.source==="rest"?"rest":"awake"};})
        .filter(function(p){return p.t<=NOW_HOUR;}).sort(function(a,b){return a.t-b.t;});
      if(!ud.length)throw new Error("nodata");
      activeData=ud;activeBpm=ud[Math.floor(ud.length/2)].bpm;userConnected=true;
      el("transMsg").classList.remove("on");el("transTxt").textContent=T().connected;el("transMsg").classList.add("on");
      setTimeout(function(){el("transMsg").classList.remove("on");setTimeout(returnToS2,600);},2000);
    })
    .catch(function(err){
      el("transMsg").classList.remove("on");el("ouraPanel").classList.add("on");
      el("tokenError").textContent=err.message==="invalid"?T().tokenErrInvalid:T().tokenErrNoData;
      el("tokenField").value="";
    });
}
