// LIFE COUNTER — born 11 July 1980 09:06 Paris (UTC+2 summer = UTC+1 winter, but July=summer so UTC+2)
var BIRTH_UTC=Date.UTC(1980,6,11,7,6,0); // 9h06 Paris summer = 7h06 UTC

function lifeCounter(){
  var diff=Date.now()-BIRTH_UTC;
  var ms=diff;
  var years=Math.floor(ms/(365.25*24*3600*1000)); ms-=years*365.25*24*3600*1000;
  var months=Math.floor(ms/(30.44*24*3600*1000)); ms-=months*30.44*24*3600*1000;
  var days=Math.floor(ms/(24*3600*1000)); ms-=days*24*3600*1000;
  var hours=Math.floor(ms/(3600*1000)); ms-=hours*3600*1000;
  var minutes=Math.floor(ms/60000);
  return {years:years,months:months,days:days,hours:hours,minutes:minutes};
}

function updateSubjectLabel(){
  var c=lifeCounter();
  var sl=el("subjectLabel"); if(!sl)return;
  if(lang==="fr"){
    sl.textContent=T().subjectOwner+" \u2014 Ce c\u0153ur bat depuis "+c.years+"\u00a0ans, "+c.months+"\u00a0mois, "+c.days+"\u00a0jours, "+c.hours+"\u00a0h et "+c.minutes+"\u00a0min.";
  } else {
    sl.textContent=T().subjectOwner+" \u2014 This heart has been beating for "+c.years+" years, "+c.months+" months, "+c.days+" days, "+c.hours+"h and "+c.minutes+" min.";
  }
}

var SOUND_URL="https://media.studiocosmo.space/followmyheart/heartbeat.mp3";

function initAudio(onReady){
  if(isIOS){
    // iOS: use HTML Audio element, triggered in user gesture
    beatEl=document.getElementById('beatSound');
    if(beatEl){
      var p=beatEl.play();
      if(p!==undefined){
        p.then(function(){beatEl.pause();beatEl.currentTime=0;if(onReady)onReady();})
         .catch(function(){if(onReady)onReady();});
      } else {beatEl.pause();beatEl.currentTime=0;if(onReady)onReady();}
    } else {if(onReady)onReady();}
  } else {
    // Desktop: Web Audio API
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){if(onReady)onReady();return;}
    audioCtx=new AC();
    if(audioCtx.state==="suspended")audioCtx.resume();
    audioCtx.decodeAudioData(b64ToBuffer(SOUND_B64),function(buf){
      audioBuffer=buf;
      if(onReady)onReady();
    },function(){if(onReady)onReady();});
  }
}

function scheduleBeat(time){
  if(!soundOn)return;
  if(isIOS){
    // iOS: clone HTML Audio element
    if(!beatEl)return;
    var now=performance.now()/1000;
    var delay=Math.max(0,(time-now)*1000);
    setTimeout(function(){
      if(!soundOn)return;
      var s=beatEl.cloneNode();
      s.volume=0.82;
      s.play().catch(function(){});
    },delay);
  } else {
    // Desktop: Web Audio API
    if(!audioBuffer||!audioCtx)return;
    if(audioCtx.state==="suspended")audioCtx.resume();
    try{
      var src=audioCtx.createBufferSource();
      src.buffer=audioBuffer;
      var g=audioCtx.createGain();g.gain.value=0.82;
      src.connect(g);g.connect(audioCtx.destination);
      src.start(Math.max(time,audioCtx.currentTime));
    }catch(e){}
  }
}

function stopScheduler(){clearTimeout(schedHandle);}


// BPM PANEL — positioned right edge of graph
function positionBpmPanel(){
  var panel=el("bpmPanel"); if(!panel)return;
  if(W<700){
    panel.style.right="8px";
    panel.style.bottom="130px";
  } else {
    var ga=el("graphArea"); if(!ga||!GRAPH_W)return;
    var gRect=ga.getBoundingClientRect();
    panel.style.right=(W-gRect.right)+"px";
    panel.style.bottom="128px";
  }
}

function updateBpmPanel(){
  var numEl=el("bpmNum"),stateEl=el("bpmState"),labelEl=el("bpmLabel"),heartEl=el("bpmHeart");
  if(!numEl)return;
  numEl.textContent=Math.round(activeBpm);
  var t=T(),hue,state;
  if(activeBpm<60){hue="rgba(120,160,210,0.9)";state=t.states.rest;}
  else if(activeBpm<85){hue="rgba(220,160,100,0.9)";state=t.states.calm;}
  else if(activeBpm<100){hue="rgba(210,80,130,0.9)";state=t.states.stressed;}
  else{hue="rgba(170,60,210,0.9)";state=t.states.active;}
  numEl.style.color=hue;numEl.style.textShadow="0 0 30px "+hue;
  if(stateEl){stateEl.textContent=state;stateEl.style.color=hue.replace("0.9","0.55");}
  if(heartEl)heartEl.style.color=hue;
  if(labelEl)labelEl.textContent=t.bpmLabel;
}
function applyVideoRate(){
  var v=el("bgVideo");if(v)v.playbackRate=Math.max(0.1,Math.min(4.0,activeBpm/VIDEO_BPM));
  updateBpmPanel();
}

// TYPEWRITER — faster version for instant-then-slow
var TM={a:"sq",e:"rw",i:"ou",o:"ip",u:"yi",r:"et",t:"ry",n:"bm",s:"ad",l:"ko",c:"vx",m:"nk",d:"sf",p:"ol",h:"gj"};

function typeChars(container,text,speed,noTypo,onDone){
  var cur=document.createElement("span");cur.className="bcursor blink";container.appendChild(cur);
  var chars=text.split(""),i=0;
  var typoPositions=[];
  if(speed==="human"&&!noTypo){
    var elig=[];
    for(var k=0;k<chars.length;k++)if(/[a-zA-Z]/.test(chars[k])&&TM[chars[k].toLowerCase()])elig.push(k);
    for(var att=0;att<80&&typoPositions.length<2;att++){
      var ri=elig[Math.floor(Math.random()*elig.length)];
      var ok=true;for(var jj=0;jj<typoPositions.length;jj++)if(Math.abs(typoPositions[jj]-ri)<20){ok=false;break;}
      if(ok)typoPositions.push(ri);
    }
  }
  function next(){
    if(i>=chars.length){if(cur.parentNode)cur.parentNode.removeChild(cur);if(onDone)onDone();return;}
    var c=chars[i];
    var bd;
    if(speed==="instant"){bd=6+Math.random()*4;}
    else if(speed==="slow"){bd=c===" "?120+Math.random()*40:(c==="."||c==="?"||c===","||c==="\u2026")?250+Math.random()*80:70+Math.random()*50;}
    else{bd=c===" "?35+Math.random()*15:(c==="."||c==="?"||c===","||c==="\u2026")?80+Math.random()*30:20+Math.random()*18;}
    var isTypo=false;
    for(var j=0;j<typoPositions.length;j++)if(typoPositions[j]===i){isTypo=true;break;}
    if(isTypo&&TM[c.toLowerCase()]){
      var wc=TM[c.toLowerCase()][Math.floor(Math.random()*TM[c.toLowerCase()].length)];
      var wt=document.createTextNode(wc);container.insertBefore(wt,cur);
      setTimeout(function(){container.removeChild(wt);setTimeout(function(){container.insertBefore(document.createTextNode(c),cur);i++;setTimeout(next,bd);},80);},100+Math.random()*120);
    } else {container.insertBefore(document.createTextNode(c),cur);i++;setTimeout(next,bd);}
  }
  next();
}

// INTRO — quote instant, rest human
function startIntro(){
  var container=el("introLines");if(!container)return;container.innerHTML="";
  var lines=INTRO[lang];
  var lineIdx=0;
  function doLine(){
    if(lineIdx>=lines.length){
      // Wait 3s with text visible, then fade out, then show button
      setTimeout(function(){
        var iw=el("introWrap"),frost=el("s1Frost");
        if(iw)iw.style.opacity="0";if(frost)frost.style.opacity="0";
        setTimeout(function(){
          var s1=el("s1");if(s1){s1.style.opacity="0";s1.style.pointerEvents="none";}
          setTimeout(function(){var eb=el("enterBtn");if(eb)eb.classList.add("on");},500);
        },800);
      },4000);return;
    }
    var line=lines[lineIdx++];
    if(line.isGap){
      var g=document.createElement("span");g.className="iline gap";container.appendChild(g);
      setTimeout(doLine,60);return;
    }
    var span=document.createElement("span");
    span.className="iline"+(line.cls?" "+line.cls:"");
    container.appendChild(span);
    var capturedPause=line.pause||200;
    typeChars(span,line.text,"human",true,function(){
      var pc=document.createElement("span");pc.className="bcursor blink";span.appendChild(pc);
      setTimeout(function(){if(pc.parentNode)pc.parentNode.removeChild(pc);setTimeout(doLine,80);},capturedPause);
    });
  }
  doLine();
}

// ENTER
// ── FETCH OWNER DATA J-7 via Worker proxy ────────────────────────────────
var WORKER_URL = "https://followmyheart-api.olivier-8db.workers.dev";

function fetchOwnerData(onDone){
  // J-7 en heure de Montréal
  var now=new Date();
  var mtl=new Date(now.toLocaleString("en-US",{timeZone:"America/Toronto"}));
  mtl.setDate(mtl.getDate()-7);
  var ds=mtl.getFullYear()+"-"+String(mtl.getMonth()+1).padStart(2,"0")+"-"+String(mtl.getDate()).padStart(2,"0");
  fetch(WORKER_URL+"?date="+ds)
    .then(function(r){if(!r.ok)throw new Error("fetch");return r.json();})
    .then(function(json){
      if(!json.data||!json.data.length)throw new Error("empty");
      var ud=json.data.map(function(p){
        var d2=new Date(p.timestamp);
        var mtlT=new Date(d2.toLocaleString("en-US",{timeZone:"America/Toronto"}));
        return {t:mtlT.getHours()+mtlT.getMinutes()/60,bpm:p.bpm,src:p.source==="workout"?"workout":p.source==="rest"?"rest":"awake"};
      }).filter(function(p){return p.t<=NOW_HOUR;}).sort(function(a,b){return a.t-b.t;});
      if(!ud.length)throw new Error("empty");
      onDone(ud);
    })
    .catch(function(){
      // Fallback to hardcoded data
      onDone(OWNER_DATA);
    });
}

// GRAPH
function drawGraph(data){
  if(!data||!data.length)return;
  var hg=el("heartGraph");if(!hg)return;
  var gCtx=hg.getContext("2d");
  var minBpm=44,maxBpm=130,nowH=NOW_HOUR||14;
  var gH=90,padL=38,padR=12,padT=10,padB=28;
  GRAPH_W=Math.max(80,W<700?Math.round(W*0.96):Math.round(W*0.60));
  var dpr=window.devicePixelRatio||1;
  hg.width=Math.round(GRAPH_W*dpr);
  hg.height=Math.round(gH*dpr);
  hg.style.width=GRAPH_W+"px";
  hg.style.height=gH+"px";
  // Scale all drawing to physical pixels
  gCtx.setTransform(dpr,0,0,dpr,0,0);
  gCtx.clearRect(0,0,GRAPH_W,gH);
  var px=function(v){return v;}; // coords stay in CSS px, setTransform handles scaling
  var chartW=GRAPH_W-padL-padR,chartH=gH-padT-padB;
  function xP(t){return padL+(t/nowH)*chartW;}
  function yP(b){return padT+chartH-(b-minBpm)/(maxBpm-minBpm)*chartH;}

  gCtx.fillStyle="rgba(8,2,6,0.85)";gCtx.fillRect(0,0,GRAPH_W,gH);
  gCtx.font="6px Space Mono,monospace";gCtx.imageSmoothingEnabled=false;
  [50,75,100].forEach(function(b){
    var y=yP(b);
    gCtx.beginPath();gCtx.moveTo(padL,y);gCtx.lineTo(GRAPH_W-padR,y);
    gCtx.strokeStyle="rgba(255,255,255,0.05)";gCtx.lineWidth=0.5;gCtx.stroke();
    gCtx.fillStyle="rgba(220,180,140,0.55)";gCtx.textAlign="right";gCtx.fillText(b,padL-4,y+3);
  });
  gCtx.textAlign="center";
  for(var h=0;h<=nowH;h+=3){
    gCtx.fillStyle="rgba(220,180,140,0.42)";
    gCtx.fillText(h+"h",xP(h),gH-6);
  }
  gCtx.beginPath();data.forEach(function(p,i){i===0?gCtx.moveTo(xP(p.t),yP(p.bpm)):gCtx.lineTo(xP(p.t),yP(p.bpm));});
  gCtx.lineTo(xP(data[data.length-1].t),gH-padB);gCtx.lineTo(xP(data[0].t),gH-padB);gCtx.closePath();
  var fillG=gCtx.createLinearGradient(0,padT,0,gH-padB);
  fillG.addColorStop(0,"rgba(160,40,20,0.18)");fillG.addColorStop(1,"rgba(60,5,15,0)");
  gCtx.fillStyle=fillG;gCtx.fill();
  // workout zones
  var inW=false,wSi=null;
  data.forEach(function(p,i){
    if(p.src==="workout"&&!inW){inW=true;wSi=i;}
    else if(p.src!=="workout"&&inW){
      var rg=gCtx.createLinearGradient(0,padT,0,padT+chartH);
      rg.addColorStop(0,"rgba(180,20,20,0.25)");rg.addColorStop(1,"rgba(130,10,10,0)");
      gCtx.fillStyle=rg;gCtx.fillRect(xP(data[wSi].t),padT,xP(data[i-1].t)-xP(data[wSi].t),chartH);
      inW=false;
    }
  });
  // gradient line
  var lg=gCtx.createLinearGradient(xP(data[0].t),0,xP(data[data.length-1].t),0);
  lg.addColorStop(0,"hsl(35,82%,62%)");lg.addColorStop(0.30,"hsl(10,80%,60%)");
  lg.addColorStop(0.55,"hsl(0,78%,56%)");lg.addColorStop(0.75,"hsl(330,76%,58%)");lg.addColorStop(1.0,"hsl(290,72%,55%)");
  gCtx.save();gCtx.shadowBlur=10;gCtx.shadowColor="rgba(200,80,120,0.5)";
  gCtx.beginPath();data.forEach(function(p,i){i===0?gCtx.moveTo(xP(p.t),yP(p.bpm)):gCtx.lineTo(xP(p.t),yP(p.bpm));});
  gCtx.strokeStyle=lg;gCtx.lineWidth=3;gCtx.lineCap="round";gCtx.stroke();gCtx.restore();
  gCtx.beginPath();data.forEach(function(p,i){i===0?gCtx.moveTo(xP(p.t),yP(p.bpm)):gCtx.lineTo(xP(p.t),yP(p.bpm));});
  gCtx.strokeStyle=lg;gCtx.lineWidth=1.2;gCtx.lineCap="round";gCtx.stroke();
  // hover
  if(hoveredT!==null){
    var hx=xP(hoveredT),hy=yP(hoveredBpm||50);
    gCtx.beginPath();gCtx.moveTo(hx,padT);gCtx.lineTo(hx,gH-padB);
    gCtx.strokeStyle="rgba(220,180,120,0.4)";gCtx.lineWidth=0.8;gCtx.setLineDash([3,4]);gCtx.stroke();gCtx.setLineDash([]);
    gCtx.beginPath();gCtx.arc(hx,hy,3.5,0,Math.PI*2);gCtx.fillStyle="rgba(220,180,120,0.9)";gCtx.fill();
  }
  var lx=xP(data[data.length-1].t);
  gCtx.beginPath();gCtx.moveTo(lx,padT);gCtx.lineTo(lx,gH-padB);
  gCtx.strokeStyle="rgba(200,100,60,0.4)";gCtx.lineWidth=0.8;gCtx.setLineDash([2,3]);gCtx.stroke();gCtx.setLineDash([]);
  gCtx.beginPath();gCtx.arc(lx,yP(data[data.length-1].bpm),4,0,Math.PI*2);gCtx.fillStyle="rgba(200,100,60,0.85)";gCtx.fill();

  hg.style.cursor="crosshair";
  hg.onmousemove=function(e){
    var rect=hg.getBoundingClientRect();var mx=(e.clientX-rect.left)*(GRAPH_W/rect.width);
    if(mx<padL||mx>GRAPH_W-padR){hoveredT=null;hoveredBpm=null;drawGraph(data);return;}
    var t=(mx-padL)/chartW*nowH;var near=data[0];
    for(var i=0;i<data.length;i++)if(Math.abs(data[i].t-t)<Math.abs(near.t-t))near=data[i];
    hoveredT=near.t;hoveredBpm=near.bpm;drawGraph(data);
    var hh=Math.floor(near.t),mm=String(Math.round((near.t-hh)*60)).padStart(2,"0");
    el("subjectLabel").textContent=T().subjectOwner+" \u00b7 "+hh+"h"+mm+" \u00b7 "+near.bpm+" bpm";
  };
  hg.onmouseleave=function(){hoveredT=null;hoveredBpm=null;drawGraph(data);updateSubjectLabel();};
  hg.onclick=function(e){
    var rect=hg.getBoundingClientRect();var mx=(e.clientX-rect.left)*(GRAPH_W/rect.width);
    if(mx<padL||mx>GRAPH_W-padR)return;
    var t=(mx-padL)/chartW*nowH;var near=data[0];
    for(var i=0;i<data.length;i++)if(Math.abs(data[i].t-t)<Math.abs(near.t-t))near=data[i];
    activeBpm=near.bpm;applyVideoRate();
  };
}

// EGG — each line appears alone, then clears
document.body.addEventListener("click",function(e){
  if(curScreen!==2)return;
  if(e.target.closest("#nav")||e.target.closest("#sndBtn")||e.target.closest("#ynField")||
     e.target.closest("#s3Panel")||e.target.closest("#ouraPanel")||e.target.closest("#transMsg")||
     e.target.closest("#about")||e.target.closest("#contact")||e.target.closest("#eggInputWrap")||
     e.target.closest("#graphArea")||e.target.closest("#followYourWrap"))return;
  if(!eggStarted){eggStarted=true;startEgg();}
});

function startEgg(){
  el("eggLayer").classList.add("on");
  runEggLines(0);
}

function runEggLines(idx){
  var lines=EGG[lang];
  if(idx>=lines.length){
    el("eggText").textContent="";
    el("ynHintTxt").textContent=T().yn;
    el("ynPromptTxt").textContent=T().ynPrompt;
    el("eggInputWrap").classList.add("on");
    el("ynField").focus();
    return;
  }
  var line=lines[idx];
  if(line.isGap){
    setTimeout(function(){runEggLines(idx+1);},400);
    return;
  }
  var preWait=line.preGap||0;
  setTimeout(function(){
    el("eggText").textContent="";
    el("eggText").style.opacity="1";
    el("eggText").style.transition="";
    typeChars(el("eggText"),line.text,"slow",true,function(){
      if(line.isLast){
        setTimeout(function(){runEggLines(idx+1);},line.pause||200);
      } else {
        setTimeout(function(){
          el("eggText").style.transition="opacity 0.6s";
          el("eggText").style.opacity="0";
          setTimeout(function(){
            el("eggText").style.transition="";
            runEggLines(idx+1);
          },650);
        },line.pause||500);
      }
    });
  },preWait);
}

// FOLLOW YOUR HEART
function showFollowYour(){
  var wrap=el("followYourWrap"),txt=el("followYourText");
  txt.innerHTML="";wrap.classList.add("on");
  // Type "Follow " at slow speed
  typeChars(txt,"Follow ","slow",true,function(){
    // Then type "my" at slow speed
    var mySpan=document.createElement("span");txt.appendChild(mySpan);
    typeChars(mySpan,"my","slow",true,function(){
      // Backspace "my" slowly
      var c=mySpan.textContent;
      var bsIdx=c.length;
      function backspace(){
        if(bsIdx<=0){
          mySpan.textContent="";
          var em=document.createElement("em");txt.appendChild(em);
          typeChars(em,"your","slow",true,function(){
            typeChars(txt," heart","slow",true,function(){
              setTimeout(showS3,2000);
            });
          });
          return;
        }
        bsIdx--;
        mySpan.textContent=c.substring(0,bsIdx);
        setTimeout(backspace,120+Math.random()*60);
      }
      backspace();
    });
  });
}

// CONNECT OURA
function connectOura(token){
  el("ouraPanel").classList.remove("on");el("transTxt").textContent=T().connecting;el("transMsg").classList.add("on");
  var d=new Date();d.setDate(d.getDate()-7);var ds=d.toISOString().split("T")[0];
  fetch("https://api.ouraring.com/v2/usercollection/heartrate?start_datetime="+ds+"T00:00:00&end_datetime="+ds+"T23:59:59",{headers:{"Authorization":"Bearer "+token}})
    .then(function(r){if(r.status===401||r.status===403)throw new Error("invalid");return r.json();})
    .then(function(json){
      if(!json.data||!json.data.length)throw new Error("nodata");
      var ud=json.data.map(function(p){var d2=new Date(p.timestamp);return{t:d2.getHours()+d2.getMinutes()/60,bpm:p.bpm,src:p.source==="workout"?"workout":p.source==="rest"?"rest":"awake"};})
        .filter(function(p){return p.t<=NOW_HOUR;}).sort(function(a,b){return a.t-b.t;});
      if(!ud.length)throw new Error("nodata");
      activeData=ud;activeBpm=ud[Math.floor(ud.length/2)].bpm;userConnected=true;
      el("transMsg").classList.remove("on");el("transTxt").textContent=T().connected;el("transMsg").classList.add("on");
      setTimeout(function(){el("transMsg").classList.remove("on");setTimeout(returnToS2,600);},2000);
    })
    .catch(function(err){
      el("transMsg").classList.remove("on");el("ouraPanel").classList.add("on");
      el("tokenError").textContent=err.message==="invalid"?T().tokenErrInvalid:T().tokenErrNoData;
      el("tokenField").value="";
    });
}
